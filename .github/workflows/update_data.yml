name: Daily Market Data Fetch

on:
  schedule:
    - cron: '30 10 * * 1-5'
  workflow_dispatch:

# --- ADD THIS BLOCK ---
permissions:
  contents: write
# ----------------------

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance pandas pyarrow requests

      - name: Run Data Fetcher
        run: python data_fetcher.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@example.com"
          git add nifty_750_master.parquet
          git commit -m "Automated Market Data Update" || exit 0
          git push
