name: Daily Market Data Fetch

on:
  schedule:
    # 6:17 UTC = 11:47 AM IST | 10:17 UTC = 3:47 PM IST (Runs Mon-Fri)
    # Using '17' jumps the GitHub Actions traffic jam queue
    - cron: '17 6,10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install yfinance pandas pyarrow requests

      - name: Run Data Fetcher
        run: python data_fetcher.py

      - name: Commit and Push Updated Data
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@example.com"
          
          # Grab ALL parquet and csv files generated by the fetcher
          git add *.parquet
          git add *.csv
          
          git commit -m "Automated Market Data Update" || exit 0
          git push
